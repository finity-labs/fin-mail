name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  code-style:
    name: Code Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run Pint
        run: vendor/bin/pint --test

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress

  tests:
    name: Tests - PHP ${{ matrix.php }} / Filament ${{ matrix.filament }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            filament: '^4.0'
          - php: '8.3'
            filament: '^4.0'
          - php: '8.2'
            filament: '^5.0'
          - php: '8.3'
            filament: '^5.0'
          - php: '8.4'
            filament: '^5.0'
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install Filament ${{ matrix.filament }}
        run: |
          composer require "filament/filament:${{ matrix.filament }}" --no-interaction --no-update
          composer update --no-interaction --prefer-dist

      - name: Run tests
        run: vendor/bin/pest
